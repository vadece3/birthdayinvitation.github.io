<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Event Landing Page</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: #fff;
      background: #000;
    }

    .hero {
      min-height: 100vh;
      padding: 20px;
      background: url("assets/images/modifR.jpg") center/cover no-repeat;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .hero h1 {
      font-size: 3rem;
      letter-spacing: 3px;
    }

    .section {
      padding: 60px 20px;
      text-align: center;
    }

    .section.jeans {
      background: url("assets/images/jeans-stacked-wooden-table_1357-423.jpg")center/cover no-repeat;
      color: #000;
    }

    .section.dark {
      background: url("assets/images/mR.jpg")center/cover no-repeat;
    }

    .section img {
      width: 100%;
      max-width: 600px;
      border-radius: 10px;
      margin-top: 20px;
    }

    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 25px;
      background: #fff;
      color: #000;
      text-decoration: none;
      font-weight: bold;
    }

    footer {
      padding: 30px;
      text-align: center;
      background: #000;
      font-size: 14px;
      color: #aaa;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 15px;
      width: 90%;          /* responsive width */
      max-width: 400px;    /* limit on big screens */
      margin: auto;
      box-shadow: 0 0 15px rgba(205, 89, 182, 0.475);
      font-family: "Comic Sans MS", sans-serif;
      font-size: 18px;
      font-style: italic;
      color: #000;
    }

    input, select {
      width: 100%;
      box-sizing: border-box;
      padding: 10px;
      margin: 8px 0;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      background: #ff6f61;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 10px;
      cursor: pointer;
    }

    #successMessage {
      display: none;
      font-size: 18px;
      color: green;
    }
    @media (max-width: 768px) {

      .hero h1 {
        font-size: 2rem;
      }

      .section {
        padding: 40px 15px;
      }

      .card {
        font-size: 16px;
        padding: 15px;
      }

      footer h2 {
        font-size: 18px;
      }
    }
  </style>
</head>

<body>

<!-- HERO -->
<section class="hero">
</section>

<!-- ABOUT -->
<section class="section dark">
   <div>
    <div style=" font-family: Comic Sans MS, sans-serif;">
    </div>
    <div class="card">
        <p>Join my birthday party!</p>

        <p><b>Date:</b> June 13</p>
        <p><b>Time:</b> 18:00</p>
        <p><b>Location:</b>Bottroper Strasse 428, 45964 Gladbeck 🎈</p>

        <!-- FORM -->
        <form id="rsvpForm">
        <input type="text" name="name" placeholder="Name" required>
        <input type="text" name="surname" placeholder="Email" required>

        <select name="attendance" required>
            <option value="">Will you attend?</option>
            <option value="Yes">Yes, I'll be there 🎉</option>
            <option value="No">Sorry, I can't come 😢</option>
        </select>

        <button type="submit">Confirm</button>
        </form>

        <!-- SUCCESS MESSAGE -->
        <div id="successMessage">
        ✅ Thank you! Your response has been submitted.
        </div>

    </div>
  </div>

  <script>
    const form = document.getElementById("rsvpForm");
    const successMessage = document.getElementById("successMessage");

    form.addEventListener("submit", function(e) {
      e.preventDefault();

      const formData = new FormData(form);

      fetch("https://formspree.io/f/xojywozyNNNNNNNNNN", {
        method: "POST",
        body: formData,
        headers: {
          'Accept': 'application/json'
        }
      }).then(response => {
        if (response.ok) {
          form.style.display = "none"; // hide form
          successMessage.style.display = "block"; // show message
        } else {
          alert("Oops! Something went wrong. PLease Retry Again");
        }
      });
    });
  </script>
</section>

<!-- FOOTER -->
<footer>
  <h2>DON’T Forget to Confirm Your Presence</h2>
  <p>Secure your Place🎉🎉🎉🎉🎉.</p>
</footer>

</body>
</html>
